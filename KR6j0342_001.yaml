body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳教大師臣法天奉詔譯歸依普遍虛空界三世清淨平等因性等法光正覺道變化人天利樂身示居十地自在位行大施願度衆生功德相嚴名普賢今説真言祕密教爾時普賢菩薩摩訶薩欲現廣大變化而入三摩地名三界大自在入此三摩地已從清淨虛空界現無數身猶如塵沙普遍大千一切世界爾時一切佛剎所有一切如來舒其右手摩普賢菩薩摩訶薩頂讚言善哉善哉佛子汝今當説一切佛母最上陀羅尼法爾時普賢菩薩身放千光普照十方一切佛剎悉皆震動即説陀羅尼怛儞也二合他引唵引曩謨引曩摩娑怛嚩二合部嚩儞引濕嚩二合囉摩賀引部引誐引野阿三摩三摩阿彌哆娑摩阿難陀娑摩誐誐曩娑摩怛里二合婆嚩娑摩引尾引沙娑摩波囉摩引囉他二合娑摩娑嚩二合婆引嚩娑摩怛他引誐哆娑摩阿囉惹娑摩輸弟娑摩沒馱娑摩達里摩二合怛他引誐哆引娑摩僧賀尾沙摩娑摩曀迦曩野娑引誐囉尾輸馱引路引迦呬呬羅沒馱二合羅沒馱二合尾惹野尾惹野暗引鉢囉二合設訖哆二合曩野引曩野憾唧囉引地瑟吒二合曩三部引誐暗娑曩引羅野引羅野達里摩二合引誐囉二合馱囉馱囉惹野惹野吽吽馱摩馱摩娑嚩二合引賀引爾時普賢菩薩摩訶薩説此陀羅尼已佛即觀彼菩薩之身是過去先佛為悲慜一切衆生現變化身滿於三界諸世間中爾時諸大菩薩及天人阿修羅等從一切金剛峰起離自金寶莊嚴大富貴座來菩薩前而自唱言南無大慈大悲無邊大功德海最上成佛大陀羅尼法善能饒益過去未來現在三界無數衆生令得安住大法之位佛言若人聞此大陀羅尼法經無邊劫所作之罪皆悉除滅亦能枯竭煩惱大海摧壞我見高山譬如有人見百千佛經無邊劫所作善根亦不能及此真言功德此大陀羅尼是一切如來心圓滿大功德海而能出生菩提智種成就一切智地而諸佛法皆不能及此大陀羅尼名號假使百千那由他俱胝劫亦難得聞若有人於此經典受持讀誦恭敬供養彼等衆生善解總持能活慧命住如來位成就一切功德若有人讀誦此經一遍二遍乃至三遍彼人得最上功德能滅一切罪能斷一切煩惱復得值遇諸佛如來不受一切憂愁苦惱若於寂靜之處獨樹之下一心持誦彼人獲得一切成就之法衆所愛敬若有人於大林野結跏趺坐誦此經典滿於七邊彼人不久得大禪定斷一切煩惱復得普賢菩薩結跏趺坐而現於前若人隨自力分以香華供養誦此陀羅尼乃至困臥睡眠於其夢中見普賢菩薩舒其右手放法光明灌照身心作如是言善哉善哉佛子如來大曼拏羅轉身而得大菩薩位身心安樂具大福德智慧常得見於普賢菩薩摩訶薩若人以慈悲心為一切衆生讀誦此經彼人得十波羅蜜圓滿滅除一切煩惱罪垢復得天人衛護如來讚言佛子汝若依行不久當入普賢之地
